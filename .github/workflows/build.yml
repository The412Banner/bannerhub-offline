name: Build APK

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download original APK
        run: |
          gh release download base-apk --pattern "*.apk" -D base/ -R ${{ github.repository }}
          ls base/
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install apktool
        run: |
          APKTOOL_VER=2.9.3
          mkdir -p $HOME/bin
          wget -q "https://github.com/iBotPeaches/Apktool/releases/download/v${APKTOOL_VER}/apktool_${APKTOOL_VER}.jar" -O $HOME/bin/apktool.jar
          wget -q "https://raw.githubusercontent.com/iBotPeaches/Apktool/master/scripts/linux/apktool" -O $HOME/bin/apktool
          chmod +x $HOME/bin/apktool
          echo "$HOME/bin" >> $GITHUB_PATH
          java -jar $HOME/bin/apktool.jar --version

      - name: Decompile APK
        run: |
          APK=$(ls base/*.apk | head -1)
          echo "Decompiling: $APK"
          java -jar $HOME/bin/apktool.jar d "$APK" -o apktool_out_base -f

      - name: Remove uncompilable apktool artifacts
        run: |
          # raws.xml contains Firebase boolean entries that aapt2 rejects (expects file refs)
          rm -f apktool_out_base/res/values/raws.xml
          # Remove the matching public.xml declarations or aapt2 errors on missing symbols
          sed -i '/firebase_common_keep\|firebase_crashlytics_keep/d' apktool_out_base/res/values/public.xml

      - name: Apply patches
        run: |
          if [ -d "patches" ] && [ "$(ls -A patches)" ]; then
            echo "Applying patches..."
            cp -r patches/. apktool_out_base/
            echo "Patches applied."
          else
            echo "No patches to apply."
          fi

      - name: Rebuild and Sign Multiple APKs
        run: |
          # Define targets: "output_filename:package_name:display_label"
          TARGETS=(
            "Bannerhub-5.3.5-Revanced-Normal.apk:gamehub.lite:GameHub Revanced"
            "Bannerhub-5.3.5-Revanced-PuBG.apk:com.tencent.ig:GameHub Revanced PuBG"
            "Bannerhub-5.3.5-Revanced-AnTuTu.apk:com.antutu.ABenchMark:GameHub Revanced AnTuTu"
            "Bannerhub-5.3.5-Revanced-Ludashi.apk:com.ludashi.aibench:GameHub Revanced Ludashi"
            "Bannerhub-5.3.5-Revanced-Genshin.apk:com.mihoyo.genshinimpact:GameHub Revanced Genshin"
          )

          for target in "${TARGETS[@]}"; do
            out_apk="${target%%:*}"
            remainder="${target#*:}"
            pkg_name="${remainder%%:*}"
            display_label="${remainder#*:}"

            echo "========================================"
            echo "Building $out_apk with package $pkg_name"
            echo "========================================"

            # Create a fresh copy of the patched decompiled source
            rm -rf apktool_out
            cp -r apktool_out_base apktool_out

            # Update package name if not default
            if [ "$pkg_name" != "gamehub.lite" ]; then
              echo "Patching AndroidManifest.xml for package: $pkg_name"
              sed -i "s/package=\"gamehub.lite\"/package=\"$pkg_name\"/g" apktool_out/AndroidManifest.xml
              # Update provider authorities to prevent install conflicts with multiple versions
              sed -i "s/android:authorities=\"gamehub.lite/android:authorities=\"$pkg_name/g" apktool_out/AndroidManifest.xml
            fi

            # Set per-variant display label
            sed -i "s/android:label=\"GameHub Revanced\"/android:label=\"$display_label\"/" apktool_out/AndroidManifest.xml
            
            # Rebuild
            echo "Building APK with apktool..."
            java -jar $HOME/bin/apktool.jar b apktool_out -o rebuilt-unsigned.apk
            
            # Align
            echo "Zipaligning..."
            ${ANDROID_SDK_ROOT}/build-tools/$(ls ${ANDROID_SDK_ROOT}/build-tools | tail -1)/zipalign -f -v 4 rebuilt-unsigned.apk rebuilt-aligned.apk
            
            # Sign
            echo "Signing with AOSP testkey..."
            ${ANDROID_SDK_ROOT}/build-tools/$(ls ${ANDROID_SDK_ROOT}/build-tools | tail -1)/apksigner sign \
              --key testkey.pk8 \
              --cert testkey.x509.pem \
              --v1-signing-enabled true \
              --v2-signing-enabled true \
              --v3-signing-enabled true \
              --out "$out_apk" \
              rebuilt-aligned.apk
              
            echo "Completed: $out_apk ($(du -sh "$out_apk" | cut -f1))"
          done

      - name: Get tag name
        id: tag
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "name=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "name=manual-$(date +%Y%m%d-%H%M%S)" >> $GITHUB_OUTPUT
          fi

      - name: Upload release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: Bannerhub ${{ steps.tag.outputs.name }}
          prerelease: ${{ contains(steps.tag.outputs.name, '-') }}
          files: Bannerhub-*.apk