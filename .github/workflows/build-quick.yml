name: Build APK (Offline — Normal only)

on:
  push:
    tags:
      - 'v*-pre*'
      - 'v*-beta*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download original APK
        run: |
          gh release download base-apk --pattern "*.apk" -D base/ -R The412Banner/bannerhub
          ls base/
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install apktool
        run: |
          APKTOOL_VER=2.9.3
          mkdir -p $HOME/bin
          wget -q "https://github.com/iBotPeaches/Apktool/releases/download/v${APKTOOL_VER}/apktool_${APKTOOL_VER}.jar" -O $HOME/bin/apktool.jar
          wget -q "https://raw.githubusercontent.com/iBotPeaches/Apktool/master/scripts/linux/apktool" -O $HOME/bin/apktool
          chmod +x $HOME/bin/apktool
          echo "$HOME/bin" >> $GITHUB_PATH
          java -jar $HOME/bin/apktool.jar --version

      - name: Decompile APK
        run: |
          APK=$(ls base/*.apk | head -1)
          echo "Decompiling: $APK"
          java -jar $HOME/bin/apktool.jar d "$APK" -o apktool_out -f

      - name: Remove uncompilable apktool artifacts
        run: |
          rm -f apktool_out/res/values/raws.xml
          sed -i '/firebase_common_keep\|firebase_crashlytics_keep/d' apktool_out/res/values/public.xml

          # Extract original classes12.dex and skip smali reassembly (dex index limit workaround)
          APK=$(ls base/*.apk | head -1)
          unzip -p "$APK" classes12.dex > classes12.dex
          rm -rf apktool_out/smali_classes12

      - name: Apply patches
        run: |
          if [ -d "patches" ] && [ "$(ls -A patches)" ]; then
            echo "Applying patches..."
            cp -r patches/. apktool_out/
            echo "Patches applied."
          else
            echo "No patches to apply."
          fi

      - name: Download and bundle components
        run: |
          BASE="https://github.com/The412Banner/bannerhub-api/releases/download/Components"
          BIGEYES="https://zlyer-cdn-comps-en.bigeyes.com"

          # WCP components (bundled/wcp/)
          mkdir -p bundled/wcp

          echo "Downloading Box64..."
          wget -q "https://github.com/The412Banner/Nightlies/releases/download/Box64/box64-0.4.1-fix.wcp" \
            -O bundled/wcp/box64-0.4.1-fix.wcp

          echo "Downloading DXVK..."
          wget -q "https://github.com/The412Banner/Nightlies/releases/download/Dxvk-gplasync-arm64ec/dxvk-gplasync-arm64ec-2.7.1-1.wcp" \
            -O bundled/wcp/dxvk-gplasync-arm64ec-2.7.1-1.wcp

          echo "Downloading VKD3D-Proton..."
          wget -q "https://github.com/The412Banner/Nightlies/releases/download/Vkd3d-proton/vkd3d-proton-3.0b.wcp" \
            -O bundled/wcp/vkd3d-proton-3.0b.wcp

          # GameHub components (bundled/xj_winemu/xj_downloads/...)
          mkdir -p "bundled/xj_winemu/xj_downloads/env/proton10.0-arm64x-2/1.0.3"
          mkdir -p "bundled/xj_winemu/xj_downloads/env/Firmware/1.3.3"
          mkdir -p "bundled/xj_winemu/xj_downloads/component/vkd3d-2.12/1.1.1"
          mkdir -p "bundled/xj_winemu/xj_downloads/component/base/1.0.0"
          mkdir -p "bundled/xj_winemu/xj_downloads/component/dxvk-v2.4.1-async/1.1.0"
          mkdir -p "bundled/xj_winemu/xj_downloads/component/Fex-20260321/1.0.0"
          mkdir -p "bundled/xj_winemu/xj_downloads/component/Turnip_v26.1.0_R5/1.0.0"
          mkdir -p "bundled/xj_winemu/xj_downloads/component/steam_9866233/1.0.0"

          echo "Downloading Proton Wine..."
          wget -q "$BASE/wine_proton10.0-arm64x-2.tar.zst" \
            -O "bundled/xj_winemu/xj_downloads/env/proton10.0-arm64x-2/1.0.3/wine_proton10.0-arm64x-2.tar.zst"

          echo "Downloading ImageFS (Firmware)..."
          wget -q "$BASE/imagefs.zst" \
            -O "bundled/xj_winemu/xj_downloads/env/Firmware/1.3.3/imagefs.zst"

          echo "Downloading VKD3D 2.12..."
          wget -q "$BIGEYES/ux-landscape-test/pc_zst/4f3e/99/43/vkd3d-2.12.tzst" \
            -O "bundled/xj_winemu/xj_downloads/component/vkd3d-2.12/1.1.1/vkd3d-2.12.tzst"

          echo "Downloading base..."
          wget -q "$BIGEYES/ux-landscape/pc_zst/3d5c/31/b1/base.tzst" \
            -O "bundled/xj_winemu/xj_downloads/component/base/1.0.0/base.tzst"

          echo "Downloading DXVK async..."
          wget -q "$BIGEYES/ux-landscape/pc_zst/d430/3a/db/dxvk-v2.4.1-async.tzst" \
            -O "bundled/xj_winemu/xj_downloads/component/dxvk-v2.4.1-async/1.1.0/dxvk-v2.4.1-async.tzst"

          echo "Downloading FEX-20260321..."
          wget -q "$BASE/e41acf1248a8e48411ce2b7f8c73dc65.tzst" \
            -O "bundled/xj_winemu/xj_downloads/component/Fex-20260321/1.0.0/Fex-20260321.tzst"

          echo "Downloading Turnip_v26.1.0_R5..."
          wget -q "$BASE/36e67b87b7597fb049edf3d18b62e353.tzst" \
            -O "bundled/xj_winemu/xj_downloads/component/Turnip_v26.1.0_R5/1.0.0/Turnip_v26.1.0_R5.tzst"

          echo "Downloading Steam..."
          wget -q "$BIGEYES/ux-landscape/pc_zst/250a/09/96/steam_9866233.tar.zst" \
            -O "bundled/xj_winemu/xj_downloads/component/steam_9866233/1.0.0/steam_9866233.tar.zst"

          echo "--- Bundled file sizes ---"
          du -sh bundled/wcp/* \
            "bundled/xj_winemu/xj_downloads/env/proton10.0-arm64x-2/1.0.3/wine_proton10.0-arm64x-2.tar.zst" \
            "bundled/xj_winemu/xj_downloads/env/Firmware/1.3.3/imagefs.zst" \
            bundled/xj_winemu/xj_downloads/component/*/* 2>/dev/null || true

      - name: Apply Grant Root Access smali patches
        run: |
          python3 << 'PYEOF'
          import sys

          def patch(path, old, new, label):
              try:
                  content = open(path, encoding='utf-8').read()
              except UnicodeDecodeError:
                  content = open(path, encoding='latin-1').read()
              if old not in content:
                  print(f"ERROR: anchor not found in {path} for: {label}")
                  sys.exit(1)
              open(path, 'w', encoding='utf-8').write(content.replace(old, new, 1))
              print(f"OK: {label}")

          # Patch 1: SettingBtnHolder.w() — handle click for contentType=0x64 (Grant Root Access)
          patch(
              'apktool_out/smali_classes6/com/xj/landscape/launcher/ui/setting/holder/SettingBtnHolder.smali',
              '    move-result p0\n'
              '\n'
              '    .line 15\n'
              '    sget-object p1, Lcom/xj/landscape/launcher/data/model/entity/SettingItemEntity;'
              '->Companion:Lcom/xj/landscape/launcher/data/model/entity/SettingItemEntity$Companion;\n',
              '    move-result p0\n'
              '\n'
              '    # BannerHub: Grant Root Access (contentType=0x64) — injected early while p2 is still a View\n'
              '    const/16 v0, 0x64\n'
              '\n'
              '    if-ne p0, v0, :bh_skip_root_grant\n'
              '\n'
              '    invoke-virtual {p2}, Landroid/view/View;->getContext()Landroid/content/Context;\n'
              '\n'
              '    move-result-object v0\n'
              '\n'
              '    invoke-static {v0}, Lcom/xj/winemu/sidebar/BhRootGrantHelper;->requestRoot(Landroid/content/Context;)V\n'
              '\n'
              '    sget-object v0, Lkotlin/Unit;->a:Lkotlin/Unit;\n'
              '\n'
              '    return-object v0\n'
              '\n'
              '    :bh_skip_root_grant\n'
              '\n'
              '    .line 15\n'
              '    sget-object p1, Lcom/xj/landscape/launcher/data/model/entity/SettingItemEntity;'
              '->Companion:Lcom/xj/landscape/launcher/data/model/entity/SettingItemEntity$Companion;\n',
              'SettingBtnHolder.w(): Grant Root Access click handler (contentType=0x64)'
          )

          # Patch 2: SettingItemEntity.getContentName() — return "Grant Root Access" for contentType=0x64
          patch(
              'apktool_out/smali_classes13/com/xj/landscape/launcher/data/model/entity/SettingItemEntity.smali',
              '    :cond_15\n'
              '    invoke-static {p0}, Lapp/revanced/extension/gamehub/prefs/GameHubPrefs;->getCustomSettingName(I)Ljava/lang/String;\n',
              '    :cond_15\n'
              '    # BannerHub: Grant Root Access (contentType=0x64)\n'
              '    const/16 v0, 0x64\n'
              '\n'
              '    if-ne p0, v0, :bh_skip_grant_name\n'
              '\n'
              '    const-string p0, "Grant Root Access"\n'
              '\n'
              '    return-object p0\n'
              '\n'
              '    :bh_skip_grant_name\n'
              '    invoke-static {p0}, Lapp/revanced/extension/gamehub/prefs/GameHubPrefs;->getCustomSettingName(I)Ljava/lang/String;\n',
              'SettingItemEntity.getContentName(): return "Grant Root Access" for contentType=0x64'
          )

          # Patch 3: SettingItemViewModel.k() — add Grant Root Access TYPE_BTN below Clear Cache
          patch(
              'apktool_out/smali_classes3/com/xj/landscape/launcher/vm/SettingItemViewModel.smali',
              '    invoke-interface {p0, v0}, Ljava/util/List;->add(Ljava/lang/Object;)Z\n'
              '\n'
              '    .line 79\n'
              '    return-object p0\n'
              '.end method\n'
              '\n'
              '.method public final m()Ljava/util/List;\n',
              '    invoke-interface {p0, v0}, Ljava/util/List;->add(Ljava/lang/Object;)Z\n'
              '\n'
              '    # BannerHub: Grant Root Access button (contentType=0x64) below Clear Cache\n'
              '    new-instance v0, Lcom/xj/landscape/launcher/data/model/entity/SettingItemEntity;\n'
              '\n'
              '    const/16 v2, 0x64\n'
              '\n'
              '    invoke-direct/range {v0 .. v6}, Lcom/xj/landscape/launcher/data/model/entity/SettingItemEntity;'
              '-><init>(IILandroid/util/SparseArray;ZILkotlin/jvm/internal/DefaultConstructorMarker;)V\n'
              '\n'
              '    invoke-interface {p0, v0}, Ljava/util/List;->add(Ljava/lang/Object;)Z\n'
              '\n'
              '    .line 79\n'
              '    return-object p0\n'
              '.end method\n'
              '\n'
              '.method public final m()Ljava/util/List;\n',
              'SettingItemViewModel.k(): add Grant Root Access TYPE_BTN after Clear Cache'
          )

          print("\nAll Grant Root Access patches applied successfully.")
          PYEOF

      - name: Patch package name for pre/beta (isolate from stable installs)
        run: |
          sed -i "s/gamehub\.lite/banner.hub/g" apktool_out/AndroidManifest.xml

      - name: Rebuild and Sign (Normal variant only)
        run: |
          echo "Building Normal variant (banner.hub — pre/beta isolated package)..."

          # Rebuild
          java -jar $HOME/bin/apktool.jar b apktool_out -o rebuilt-unsigned.apk

          # Inject original classes12.dex (skipped smali reassembly due to dex index limit)
          zip rebuilt-unsigned.apk classes12.dex

          # Inject bundled components with STORED compression (already compressed)
          cd bundled && zip -0 ../rebuilt-unsigned.apk -r . && cd ..

          # Compile and inject extension dex as classes18.dex
          ANDROID_JAR=$(ls $ANDROID_SDK_ROOT/platforms/android-*/android.jar 2>/dev/null | sort -V | tail -1)
          mkdir -p ext_classes
          javac -source 8 -target 8 -cp "$ANDROID_JAR" -d ext_classes extension/*.java
          BUILD_TOOLS=$(ls $ANDROID_SDK_ROOT/build-tools | sort -V | tail -1)
          mkdir -p ext_dex
          $ANDROID_SDK_ROOT/build-tools/$BUILD_TOOLS/d8 --release --min-api 26 --output ext_dex $(find ext_classes -name "*.class")
          cp ext_dex/classes.dex classes18.dex
          zip -j rebuilt-unsigned.apk classes18.dex

          # Align
          ${ANDROID_SDK_ROOT}/build-tools/$(ls ${ANDROID_SDK_ROOT}/build-tools | tail -1)/zipalign -f -v 4 rebuilt-unsigned.apk rebuilt-aligned.apk

          # Sign
          APK_NAME="BannerHub-Offline-${GITHUB_REF_NAME}-Normal.apk"
          ${ANDROID_SDK_ROOT}/build-tools/$(ls ${ANDROID_SDK_ROOT}/build-tools | tail -1)/apksigner sign \
            --key testkey.pk8 \
            --cert testkey.x509.pem \
            --v1-signing-enabled true \
            --v2-signing-enabled true \
            --v3-signing-enabled true \
            --out "$APK_NAME" \
            rebuilt-aligned.apk

          echo "Done: $APK_NAME ($(du -sh "$APK_NAME" | cut -f1))"

      - name: Get tag name
        id: tag
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "name=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "name=manual-$(date +%Y%m%d-%H%M%S)" >> $GITHUB_OUTPUT
          fi

      - name: Upload release
        run: |
          TAG="${{ steps.tag.outputs.name }}"
          APK=$(ls BannerHub-Offline-*.apk | head -1)
          gh release delete "$TAG" --yes 2>/dev/null || true
          gh release create "$TAG" --title "BannerHub Offline $TAG" --prerelease "$APK"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
